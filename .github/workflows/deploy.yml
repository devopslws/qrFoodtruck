name: CI/CD - Build and Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
  PROJECT_NAME: foodtruck

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build order-service
        run: ./gradlew :orderService:build -x test

      - name: Build inventory-service
        run: ./gradlew :inventoryService:build -x test

      - name: Upload order-service artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-service-jar
          path: orderService/build/libs/*.jar

      - name: Upload inventory-service artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventory-service-jar
          path: inventoryService/build/libs/*.jar

  push-ecr:
    name: Docker Build and Push to ECR
    runs-on: ubuntu-latest
    needs: build
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download order-service artifact
        uses: actions/download-artifact@v4
        with:
          name: order-service-jar
          path: orderService/build/libs/

      - name: Download inventory-service artifact
        uses: actions/download-artifact@v4
        with:
          name: inventory-service-jar
          path: inventoryService/build/libs/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and Push order-service
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/order-service
          TAG=${{ steps.meta.outputs.tag }}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest ./orderService
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

      - name: Build and Push inventory-service
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/inventory-service
          TAG=${{ steps.meta.outputs.tag }}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest ./inventoryService
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: push-ecr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get infra values from CloudFormation
        id: infra
        run: |
          get() {
            aws cloudformation list-exports \
              --query "Exports[?Name=='$1'].Value" \
              --output text --region ${{ env.AWS_REGION }}
          }
          INSTANCE_ID=$(get foodtruck-InfraInstanceId)
          PRIVATE_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PrivateIpAddress' \
            --output text --region ${{ env.AWS_REGION }})
          echo "infra_ip=${PRIVATE_IP}" >> $GITHUB_OUTPUT
          echo "cluster=$(get foodtruck-EcsClusterName)" >> $GITHUB_OUTPUT
          echo "execution_role=$(get foodtruck-EcsTaskExecutionRoleArn)" >> $GITHUB_OUTPUT
          echo "order_tg=$(get foodtruck-OrderTargetGroupArn)" >> $GITHUB_OUTPUT
          echo "inventory_tg=$(get foodtruck-InventoryTargetGroupArn)" >> $GITHUB_OUTPUT
          echo "subnet1=$(get foodtruck-PublicSubnet1Id)" >> $GITHUB_OUTPUT
          echo "subnet2=$(get foodtruck-PublicSubnet2Id)" >> $GITHUB_OUTPUT
          echo "sg_ecs=$(get foodtruck-SgEcsId)" >> $GITHUB_OUTPUT
          echo "order_log=$(get foodtruck-OrderLogGroupName)" >> $GITHUB_OUTPUT
          echo "inventory_log=$(get foodtruck-InventoryLogGroupName)" >> $GITHUB_OUTPUT

      - name: Register order-service Task Definition
        id: order-task
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/order-service:${{ needs.push-ecr.outputs.image-tag }}"
          # ---------------------------------------------------------------
          # [FIX 1] python3 -c 로 JSON 생성 → heredoc + 변수 치환 방식 대비
          #         쉼표 누락·특수문자 오염 문제를 근본적으로 차단
          # ---------------------------------------------------------------
          python3 - <<'PYEOF'
          import json, os

          infra_ip      = os.environ["INFRA_IP"]
          execution_role= os.environ["EXECUTION_ROLE"]
          image         = os.environ["IMAGE"]
          order_log     = os.environ["ORDER_LOG"]
          aws_region    = os.environ["AWS_REGION"]
          account_id    = os.environ["ACCOUNT_ID"]

          # [FIX 2] 민감 정보는 SSM Parameter Store에서 런타임에 주입 (secrets 블록)
          task = {
            "family": "foodtruck-order-task",
            "cpu": "512",
            "memory": "1024",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "executionRoleArn": execution_role,
            "containerDefinitions": [
              {
                "name": "order-service",
                "image": image,
                "portMappings": [{"containerPort": 8080, "protocol": "tcp"}],
                "environment": [
                  {"name": "INVENTORY_SERVICE_URL",         "value": f"http://{infra_ip}:8081"},
                  {"name": "SPRING_PROFILES_ACTIVE",        "value": "prod"},
                  # [FIX 3] prod 환경에서 DDL auto는 validate 권장 (스키마 보호)
                  {"name": "SPRING_JPA_HIBERNATE_DDL_AUTO", "value": "validate"},
                  {"name": "SPRING_DATASOURCE_URL",         "value": f"jdbc:mysql://{infra_ip}:3306/orderdb?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8"},
                  {"name": "SPRING_DATASOURCE_USERNAME",    "value": "order_user"},
                  {"name": "SPRING_DATA_REDIS_HOST",        "value": infra_ip},
                  {"name": "SPRING_DATA_REDIS_PORT",        "value": "6379"},
                  {"name": "SPRING_RABBITMQ_HOST",          "value": infra_ip},
                  {"name": "SPRING_RABBITMQ_PORT",          "value": "5672"},
                  {"name": "SPRING_RABBITMQ_USERNAME",      "value": "admin"},
                ],
                # [FIX 2] 패스워드·시크릿 키 → SSM Parameter Store 참조
                # ARN 형식: arn:aws:ssm:{region}:{account_id}:parameter/{name}
                "secrets": [
                  {"name": "SPRING_DATASOURCE_PASSWORD",  "valueFrom": f"arn:aws:ssm:{aws_region}:{account_id}:parameter/foodtruck/order/db-password"},
                  {"name": "SPRING_DATA_REDIS_PASSWORD",  "valueFrom": f"arn:aws:ssm:{aws_region}:{account_id}:parameter/foodtruck/redis-password"},
                  {"name": "SPRING_RABBITMQ_PASSWORD",    "valueFrom": f"arn:aws:ssm:{aws_region}:{account_id}:parameter/foodtruck/rabbitmq-password"},
                  {"name": "TOSS_CLIENT_KEY",             "valueFrom": f"arn:aws:ssm:{aws_region}:{account_id}:parameter/foodtruck/toss-client-key"},
                  {"name": "TOSS_SECRET_KEY",             "valueFrom": f"arn:aws:ssm:{aws_region}:{account_id}:parameter/foodtruck/toss-secret-key"},
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group":         order_log,
                    "awslogs-region":        aws_region,
                    "awslogs-stream-prefix": "order"
                  }
                }
              }
            ]
          }
          with open("/tmp/order-task.json", "w") as f:
            json.dump(task, f, indent=2)
          print("order-task.json written OK")
          PYEOF
        env:
          INFRA_IP:       ${{ steps.infra.outputs.infra_ip }}
          EXECUTION_ROLE: ${{ steps.infra.outputs.execution_role }}
          IMAGE:          ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/order-service:${{ needs.push-ecr.outputs.image-tag }}
          ORDER_LOG:      ${{ steps.infra.outputs.order_log }}
          AWS_REGION:     ${{ env.AWS_REGION }}
          ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Submit order-service Task Definition
        id: order-task-arn
        run: |
          TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/order-task.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text --region ${{ env.AWS_REGION }})
          echo "arn=${TASK_ARN}" >> $GITHUB_OUTPUT

      - name: Register inventory-service Task Definition
        id: inventory-task
        run: |
          python3 - <<'PYEOF'
          import json, os

          infra_ip      = os.environ["INFRA_IP"]
          execution_role= os.environ["EXECUTION_ROLE"]
          image         = os.environ["IMAGE"]
          inventory_log = os.environ["INVENTORY_LOG"]
          aws_region    = os.environ["AWS_REGION"]
          account_id    = os.environ["ACCOUNT_ID"]

          task = {
            "family": "foodtruck-inventory-task",
            "cpu": "512",
            "memory": "1024",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "executionRoleArn": execution_role,
            "containerDefinitions": [
              {
                "name": "inventory-service",
                "image": image,
                "portMappings": [{"containerPort": 8081, "protocol": "tcp"}],
                "environment": [
                  {"name": "SPRING_PROFILES_ACTIVE",        "value": "prod"},
                  {"name": "SPRING_JPA_HIBERNATE_DDL_AUTO", "value": "validate"},
                  {"name": "SPRING_DATASOURCE_URL",         "value": f"jdbc:mysql://{infra_ip}:3306/inventorydb?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8"},
                  {"name": "SPRING_DATASOURCE_USERNAME",    "value": "inventory_user"},
                  {"name": "SPRING_DATA_REDIS_HOST",        "value": infra_ip},
                  {"name": "SPRING_DATA_REDIS_PORT",        "value": "6379"},
                  {"name": "SPRING_RABBITMQ_HOST",          "value": infra_ip},
                  {"name": "SPRING_RABBITMQ_PORT",          "value": "5672"},
                  {"name": "SPRING_RABBITMQ_USERNAME",      "value": "admin"},
                ],
                "secrets": [
                  {"name": "SPRING_DATASOURCE_PASSWORD", "valueFrom": f"arn:aws:ssm:{aws_region}:{account_id}:parameter/foodtruck/inventory/db-password"},
                  {"name": "SPRING_DATA_REDIS_PASSWORD", "valueFrom": f"arn:aws:ssm:{aws_region}:{account_id}:parameter/foodtruck/redis-password"},
                  {"name": "SPRING_RABBITMQ_PASSWORD",   "valueFrom": f"arn:aws:ssm:{aws_region}:{account_id}:parameter/foodtruck/rabbitmq-password"},
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group":         inventory_log,
                    "awslogs-region":        aws_region,
                    "awslogs-stream-prefix": "inventory"
                  }
                }
              }
            ]
          }
          with open("/tmp/inventory-task.json", "w") as f:
            json.dump(task, f, indent=2)
          print("inventory-task.json written OK")
          PYEOF
        env:
          INFRA_IP:       ${{ steps.infra.outputs.infra_ip }}
          EXECUTION_ROLE: ${{ steps.infra.outputs.execution_role }}
          IMAGE:          ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/inventory-service:${{ needs.push-ecr.outputs.image-tag }}
          INVENTORY_LOG:  ${{ steps.infra.outputs.inventory_log }}
          AWS_REGION:     ${{ env.AWS_REGION }}
          ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Submit inventory-service Task Definition
        id: inventory-task-arn
        run: |
          TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/inventory-task.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text --region ${{ env.AWS_REGION }})
          echo "arn=${TASK_ARN}" >> $GITHUB_OUTPUT

      - name: Create or Update order-service ECS Service
        run: |
          CLUSTER=${{ steps.infra.outputs.cluster }}
          SERVICE=${{ env.PROJECT_NAME }}-order-service
          # [FIX 4] ALB 사용 중이므로 Public IP 불필요 → DISABLED + Private Subnet 권장
          #         현재는 원본 구성(Public Subnet) 유지하되 assignPublicIp만 DISABLED로 변경
          NETWORK_CONFIG="awsvpcConfiguration={subnets=[${{ steps.infra.outputs.subnet1 }},${{ steps.infra.outputs.subnet2 }}],securityGroups=[${{ steps.infra.outputs.sg_ecs }}],assignPublicIp=DISABLED}"

          EXISTS=$(aws ecs describe-services \
            --cluster $CLUSTER --services $SERVICE \
            --query 'services[?status==`ACTIVE`].serviceName' \
            --output text --region ${{ env.AWS_REGION }})

          if [ -z "$EXISTS" ]; then
            aws ecs create-service \
              --cluster $CLUSTER \
              --service-name $SERVICE \
              --task-definition ${{ steps.order-task-arn.outputs.arn }} \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "$NETWORK_CONFIG" \
              --load-balancers "targetGroupArn=${{ steps.infra.outputs.order_tg }},containerName=order-service,containerPort=8080" \
              --region ${{ env.AWS_REGION }}
          else
            aws ecs update-service \
              --cluster $CLUSTER \
              --service $SERVICE \
              --task-definition ${{ steps.order-task-arn.outputs.arn }} \
              --region ${{ env.AWS_REGION }}
          fi

      - name: Create or Update inventory-service ECS Service
        run: |
          CLUSTER=${{ steps.infra.outputs.cluster }}
          SERVICE=${{ env.PROJECT_NAME }}-inventory-service
          NETWORK_CONFIG="awsvpcConfiguration={subnets=[${{ steps.infra.outputs.subnet1 }},${{ steps.infra.outputs.subnet2 }}],securityGroups=[${{ steps.infra.outputs.sg_ecs }}],assignPublicIp=DISABLED}"

          EXISTS=$(aws ecs describe-services \
            --cluster $CLUSTER --services $SERVICE \
            --query 'services[?status==`ACTIVE`].serviceName' \
            --output text --region ${{ env.AWS_REGION }})

          if [ -z "$EXISTS" ]; then
            aws ecs create-service \
              --cluster $CLUSTER \
              --service-name $SERVICE \
              --task-definition ${{ steps.inventory-task-arn.outputs.arn }} \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "$NETWORK_CONFIG" \
              --load-balancers "targetGroupArn=${{ steps.infra.outputs.inventory_tg }},containerName=inventory-service,containerPort=8081" \
              --region ${{ env.AWS_REGION }}
          else
            aws ecs update-service \
              --cluster $CLUSTER \
              --service $SERVICE \
              --task-definition ${{ steps.inventory-task-arn.outputs.arn }} \
              --region ${{ env.AWS_REGION }}
          fi

      - name: Wait for deployments to stabilize
        run: |
          CLUSTER=${{ steps.infra.outputs.cluster }}
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services ${{ env.PROJECT_NAME }}-order-service \
            --region ${{ env.AWS_REGION }}
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services ${{ env.PROJECT_NAME }}-inventory-service \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Budget Guard stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/06_budget.yml \
            --stack-name foodtruck-budget \
            --parameter-overrides \
                ECSClusterName=foodtruck-cluster \
                ECSServiceNames="foodtruck-order-service,foodtruck-inventory-service" \
                MonthlyBudgetUSD=35 \
                NotificationEmail=${{ secrets.NOTIFICATION_EMAIL }} \
                StackEnv=dev \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset

      - name: Done
        run: echo "Deploy complete - image tag ${{ needs.push-ecr.outputs.image-tag }}"