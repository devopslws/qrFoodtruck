spring:
  datasource:
    url: jdbc:h2:mem:orderdb;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true   # localhost:8080/h2-console 로 DB 직접 조회 가능
  sql:
    init:
      mode: always
      data-locations: classpath:seedData.sql   # 시드 데이터