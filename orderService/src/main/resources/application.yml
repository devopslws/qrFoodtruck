server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3316/orderdb?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: order_user
    password: order_pass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123

  web:
    resources:
      cache:
        period: 0

  management:
    endpoints:
      web:
        exposure:
          include: health
    endpoint:
      health:
        show-details: never

services:
  inventory:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8081}

toss:
  client-key: ${TOSS_CLIENT_KEY}
  secret-key: ${TOSS_SECRET_KEY}

logging:
  level:
    # AsyncRequestTimeoutException: SSE 타임아웃은 정상 종료 케이스
    org.springframework.web.context.request.async: WARN
    # "Ignoring exception, response committed already" 억제
    org.springframework.web.servlet.mvc.method.annotation.ResponseBodyEmitterReturnValueHandler: WARN
    # DefaultHandlerExceptionResolver WARN 억제
    org.springframework.web.servlet.mvc.method.support.ExceptionHandlerMethodResolver: WARN


